# cargo-deny config (Phase 5, supply chain). Run: `cargo deny check`.
# Kept minimal and version-robust: newer cargo-deny removed several [advisories]
# keys (vulnerabilities are always denied; unmaintained/unsound are handled
# internally), so we only set the few keys that are stable across versions and
# rely on sane defaults otherwise.

[advisories]
# Treat installing a yanked crate as a warning (not all yanks are security).
yanked = "warn"
# Advisory IDs to silence go here once triaged (e.g. an unfixable transitive one).
ignore = []

[licenses]
# Permissive licenses we accept for a MIT-licensed app.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
    "0BSD",
    "Unlicense",
    "OpenSSL",
]
confidence-threshold = 0.9

[bans]
# Warn (don't hard-fail) on duplicate versions / wildcard deps — informational.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
