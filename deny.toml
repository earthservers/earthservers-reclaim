# cargo-deny config (Phase 5, supply chain). Run: `cargo deny check`.
# Fails CI on known-vulnerable dependencies and disallowed licenses.

[advisories]
# Fail on any security advisory affecting a dependency (RUSTSEC).
yanked = "deny"
# Unmaintained/unsound advisories warn rather than hard-fail so a transitive,
# unfixable advisory doesn't block all builds — review them in CI output.
unmaintained = "workspace"

[licenses]
# Permissive licenses we accept for a MIT-licensed app. Add others deliberately.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
    "OpenSSL",
]
confidence-threshold = 0.9

[bans]
# Warn on multiple versions of the same crate (bloat / drift), don't hard-fail.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
