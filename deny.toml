# cargo-deny config (Phase 5, supply chain). Run: `cargo deny check`.
#
# Policy: hard-fail on KNOWN VULNERABILITIES and disallowed licenses; do NOT gate
# on "unmaintained" crates, because the app's WebKitGTK/GTK3 stack (gtk-rs 0.18,
# unic, paste, proc-macro-error) is unmaintained by nature and can't be dropped
# without a full UI-stack migration. Everything fixable by a semver-compatible
# bump has already been updated in Cargo.lock (`cargo update`).

[advisories]
yanked = "warn"
# Don't fail the build on unmaintained-crate advisories (the old gtk-rs stack).
unmaintained = "none"
# Triaged, accepted VULNERABILITIES (review periodically):
ignore = [
    # ring <0.17: AES funcs may panic only when overflow-checks are on (debug).
    # Pulled transitively via jsonwebtoken 8.x -> meilisearch-sdk; needs a
    # jsonwebtoken upgrade to remove. Not reachable in release builds.
    "RUSTSEC-2025-0009",
    # glib VariantStrIter unsoundness — inherent to the unmaintained gtk-rs 0.18
    # GTK3 stack; removable only by migrating the whole UI to gtk4-rs.
    "RUSTSEC-2024-0429",
    # quick-xml 0.39 DoS advisories (quadratic dup-attribute check; unbounded
    # NsReader namespace allocation). Reached ONLY via plist -> tauri-utils,
    # which parses the app's own bundle metadata (Apple plists) — never
    # attacker-controlled XML — so the DoS input path doesn't exist here.
    # Fixed in quick-xml >=0.41, but plist 1.9.0 (latest as of 2026-07-02)
    # still pins ^0.39: remove these once plist/tauri-utils ship the bump.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
# Permissive licenses accepted for a MIT-licensed app.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
    "0BSD",
    "Unlicense",
    "OpenSSL",
    # Permissive data license used by the bundled webpki root-certificate sets.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

# `ring` ships no SPDX license field; clarify it to its actual licenses so it
# isn't flagged "unlicensed". Hash is of ring 0.16.20's LICENSE file.
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# Informational only (don't hard-fail): duplicate versions / wildcard deps.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
