# Reclaim — hardened_malloc tuning (Phase 3, allocator hardening).
#
# hardened_malloc creates many guard-page mappings; the kernel default
# vm.max_map_count (often 65530) can be exhausted by a browser workload, causing
# mmap failures / crashes. Raise it.
#
# Install:
#   sudo cp 99-reclaim-hardened-malloc.conf /etc/sysctl.d/
#   sudo sysctl --system
#
# This is OS-level tuning; it is only needed if you opted into hardened_malloc by
# building it (scripts/build-hardened-malloc.sh). It is safe to apply regardless.
vm.max_map_count = 1048576
