# All application (non-plugin) commands, as one grantable set.
#
# Autogenerated `allow-*` permissions exist because build.rs declares every
# command via AppManifest::commands. This set bundles them so the `default`
# (main window) and `secondary-windows` capabilities can grant the full app
# surface with one identifier. Packaged secondary windows load from the
# localhost asset server (a REMOTE origin to the ACL), where app commands are
# denied by default since tauri 2.11 — without this grant they can't even close
# themselves (window_close) or resolve their window label (media_window_label).
#
# KEEP IN SYNC with build.rs and lib.rs generate_handler![].

